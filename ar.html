<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Célula Vegetal AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            font-size: 18px;
            z-index: 999;
        }

        #loading p {
            margin-top: 16px;
        }
    </style>
</head>

<body>

    <div id="loading">
        <p>⏳ Cargando experiencia AR...</p>
        <p style="font-size:13px; color:#aaa;">Apuntá la cámara a la imagen de la célula</p>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" color-space="sRGB"
        renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <a-asset-item id="celula"
                src="https://raw.githubusercontent.com/IngDavidMurcia/celula-3d/main/ObjetoCelula.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#celula" position="0 0 0" scale="0.2 0.2 0.2" rotation="0 0 0"></a-gltf-model>
        </a-entity>

    </a-scene>

    <script>
        const scene = document.querySelector('a-scene');
        scene.addEventListener('loaded', () => {
            document.getElementById('loading').style.display = 'none';
        });
    </script>

</body>

</html>
