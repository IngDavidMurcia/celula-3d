<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Célula Vegetal AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            font-size: 18px;
            z-index: 999;
        }

        #loading p {
            margin-top: 16px;
        }
    </style>
</head>

<body>

    <div id="loading">
        <p>⏳ Cargando experiencia AR...</p>
        <p style="font-size:13px; color:#aaa;">Apuntá la cámara a la imagen de la célula</p>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" color-space="sRGB"
        renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <a-asset-item id="celula"
                src="https://raw.githubusercontent.com/IngDavidMurcia/celula-3d/main/ObjetoCelula.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#celula" position="0 0 0" scale="1.5 1.5 1.5" rotation="20 0 0">
            </a-gltf-model>
        </a-entity>

    </a-scene>

    <script>
        // Ocultar pantalla de carga
        const scene = document.querySelector('a-scene');
        scene.addEventListener('loaded', () => {
            document.getElementById('loading').style.display = 'none';
        });

        // Rotación con el dedo + zoom con pinch
        const modelo = document.querySelector('a-gltf-model');

        let rotX = -20;
        let rotY = 0;
        let scale = 0.8;

        // Touch único → rotación
        let lastTouchX = 0;
        let lastTouchY = 0;

        // Pinch → zoom
        let lastPinchDist = null;

        function getPinchDist(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        document.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
                lastPinchDist = null;
            } else if (e.touches.length === 2) {
                lastPinchDist = getPinchDist(e.touches);
            }
        });

        document.addEventListener('touchmove', (e) => {
            e.preventDefault();

            if (e.touches.length === 1 && lastPinchDist === null) {
                // Rotación en X e Y
                const deltaX = e.touches[0].clientX - lastTouchX;
                const deltaY = e.touches[0].clientY - lastTouchY;

                rotY += deltaX * 0.4;
                rotX += deltaY * 0.4;

                // Limitar rotación vertical para que no se voltee raro
                rotX = Math.max(-80, Math.min(80, rotX));

                modelo.setAttribute('rotation', `${rotX} ${rotY} 0`);

                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;

            } else if (e.touches.length === 2) {
                // Zoom con pinch
                const dist = getPinchDist(e.touches);
                if (lastPinchDist !== null) {
                    const delta = (dist - lastPinchDist) * 0.005;
                    scale = Math.max(0.1, Math.min(3.0, scale + delta));
                    modelo.setAttribute('scale', `${scale} ${scale} ${scale}`);
                }
                lastPinchDist = dist;
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
                lastPinchDist = null;
            }
        });
    </script>

</body>

</html>
